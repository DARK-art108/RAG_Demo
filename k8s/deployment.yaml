apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-demo
  labels:
    app: rag-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-demo
  template:
    metadata:
       labels:
          app: rag-demo
    spec:
       containers:
         - name: rag-demo
           # Local image from: docker build -t rag-app:latest .
           # For Docker Hub use: <your-dockerhub-user>/rag-demo:latest
           image: rag-app:latest
           imagePullPolicy: IfNotPresent
           ports:
             - containerPort: 8000
           env:
             - name: GROQ_API_KEY
               valueFrom:
                 secretKeyRef:
                   name: rag-demo-secrets
                   key: GROQ_API_KEY
             - name: GROQ_MODEL
               value: openai/gpt-oss-120b
          #  readinessProbe:
          #    httpGet:
          #      path: /healthz
          #      port: 8000
          #    initialDelaySeconds: 5
          #    periodSeconds: 10
          #    timeoutSeconds: 5
          #    successThreshold: 1
          #    failureThreshold: 3
          #  livenessProbe:
          #    httpGet:
          #      path: /healthz
          #      port: 8000
          #    initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rag-demo-service
spec:
  selector:
     app: rag-demo
  ports:
     - protocol: TCP
       port: 80
       targetPort: 8000
  type: ClusterIP

